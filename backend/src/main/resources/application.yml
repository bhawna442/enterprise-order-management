spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/orderms
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # use 'update' for dev, 'validate' for production
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: never   # IMPORTANT: prevents data.sql from breaking startup

  h2:
    console:
      enabled: false

server:
  port: 8081