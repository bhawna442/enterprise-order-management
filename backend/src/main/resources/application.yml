spring:
  datasource:
    url: jdbc:h2:mem:orderms
    driver-class-name: org.h2.Driver
    username: "sa"
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8081